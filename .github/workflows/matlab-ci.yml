name: MATLAB CI

on:
  push:
  pull_request:

jobs:
  matlab-test:
    runs-on: [self-hosted, linux]

    env:
      MATLAB_BIN: /home/anwar/MATLAB/R2026a/matlab

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run reference_model.m
        run: |
          set -e

          if [ ! -x "$MATLAB_BIN" ]; then
            echo "MATLAB not found at $MATLAB_BIN"
            exit 1
          fi

          cd "$GITHUB_WORKSPACE"

          echo "Running reference_model.m..."
          "$MATLAB_BIN" -batch "try, reference_model, catch e, disp(getReport(e)), exit(1), end, exit(0);"
